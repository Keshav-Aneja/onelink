services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: onelink
      POSTGRES_PASSWORD: onelink
      POSTGRES_DB: onelink
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onelink"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.local
    restart: unless-stopped
    env_file: .env.local
    environment:
      PG_CONNECTION: postgresql://onelink:onelink@postgres:5432/onelink
      REDIS_URL: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_PREFIX: "onelink:"
      FRONTEND_URL: http://localhost:3000
      LOCAL_MODE: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://localhost:8080
      VITE_LOCAL_MODE: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
